<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Portal - Farmer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h2>🥔 Potato Portal</h2>
        </header>
        
        <main class="app-content">
            <div class="section-title">👩‍🌾 Farmer Dashboard</div>
            
            <div class="card action-card">
                <h3>Post Your Harvest</h3>
                <p>List your crops so nearby buyers can find you instantly.</p>
                <a href="create-listing.html" class="primary-btn" style="text-align:center; display:block; text-decoration:none;">+ Create New Listing</a>
            </div>

            <div class="card">
                <h4>Your Active Listings</h4>
                <div id="dynamic-list"></div>
                
                <div class="item-row">
                    <span>🌾 Organic Rice (500kg)</span>
                    <span class="status status-pending">Pending</span>
                </div>
                <div class="item-row">
                    <span>🍅 Fresh Tomatoes (100kg)</span>
                    <span class="status status-success">Sold</span>
                </div>
            </div>
        </main>
        
        <nav class="app-nav">
            <a href="index.html" class="nav-btn active">👨‍🌾 Farmer</a>
            <a href="buyer.html" class="nav-btn">🛒 Buyer</a>
            <a href="market.html" class="nav-btn">📈 Market</a>
        </nav>
    </div>

    <script>
        window.onload = function() {
            const savedCrop = localStorage.getItem('newCrop');
            const savedQty = localStorage.getItem('newQty');
            const listDiv = document.getElementById('dynamic-list');
            
            if (savedCrop && savedQty && listDiv) {
                listDiv.innerHTML = `
                    <div class="item-row" style="background-color: #e8f5e9; padding: 12px 8px; border-radius: 8px; margin-bottom: 12px; border: 1px dashed #2e7d32;">
                        <span>📦 ${savedCrop} (${savedQty}kg)</span>
                        <span class="status status-success" style="background-color:#2e7d32; color:white;">Just Added</span>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
