<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriLink - Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- App Header -->
        <header class="app-header">
            <h2>AgriLink Portal</h2>
        </header>
        
        <!-- Main Content Area -->
        <main class="app-content">
            <div class="section-title">📈 Daily Market Trends</div>
            <p class="subtitle">Real-time middleman-free price tracking</p>
            
            <!-- Price Table Card -->
            <div class="card">
                <div class="table-header">
                    <span>Crop Type</span>
                    <span>Avg Price</span>
                    <span>Trend</span>
                </div>
                <hr class="divider">
                <div class="table-row">
                    <span>Phka Rumduol Rice</span>
                    <strong>$0.70/kg</strong>
                    <span class="trend up">▲ +2%</span>
                </div>
                <div class="table-row">
                    <span>Kampot Pepper</span>
                    <strong>$5.00/kg</strong>
                    <span class="trend stable">● 0%</span>
                </div>
                <div class="table-row">
                    <span>Cassava Bulbs</span>
                    <strong>$0.12/kg</strong>
                    <span class="trend down">▼ -4%</span>
                </div>
                <div class="table-row">
                    <span>Sweet Corn</span>
                    <strong>$0.35/kg</strong>
                    <span class="trend up">▲ +7%</span>
                </div>
            </div>
        </main>
        
        <!-- Bottom Navigation Bar -->
        <nav class="app-nav">
            <a href="index.html" class="nav-btn">👨‍🌾 Farmer</a>
            <a href="buyer.html" class="nav-btn">🛒 Buyer</a>
            <a href="market.html" class="nav-btn active">📈 Market</a>
        </nav>
    </div>

</body>
</html>
